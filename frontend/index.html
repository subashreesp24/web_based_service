<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Analytical Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access the platform</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" placeholder="suba" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="suba123" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div id="loginMessage" class="mt-4" style="color: var(--danger); font-size: 0.875rem;"></div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/theme.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('loginMessage');

            msg.textContent = 'Authenticating...';
            msg.style.color = 'var(--text-muted)';

            const result = await api.post('/auth/login', { email, password });

            if (result.success) {
                msg.textContent = 'Login Successful!';
                msg.style.color = 'var(--accent)';
                localStorage.setItem('user', JSON.stringify(result.user));
                localStorage.setItem('token', result.token);
                setTimeout(() => {
                    window.location.href = 'pages/dashboard.html';
                }, 1000);
            } else {
                msg.textContent = 'Login Failed: ' + (result.message || 'Invalid credentials');
                msg.style.color = 'var(--danger)';
            }
        });
    </script>
</body>
</html>
