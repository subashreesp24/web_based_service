<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | ServiceSync</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Detailed Analytics</h1>
                <p style="color: var(--text-muted)">In-depth service performance metrics</p>
            </div>
        </header>

        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-bottom: 2rem;">
            <div class="glass" style="padding: 1.5rem;">
                <h3 class="mb-4">Traffic Trends</h3>
                <div class="chart-container">
                    <canvas id="trafficChart"></canvas>
                </div>
            </div>
            <div class="glass" style="padding: 1.5rem;">
                <h3 class="mb-4">Response Time (ms)</h3>
                <div class="chart-container">
                    <canvas id="responseBarChart"></canvas>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem;">
            <div class="glass" style="padding: 1.5rem;">
                <h3 class="mb-4">Service Status Distribution</h3>
                <div class="chart-container">
                    <canvas id="statusPieChart"></canvas>
                </div>
            </div>
            <div class="glass" style="padding: 1.5rem;">
                <h3 class="mb-4">Error Rate</h3>
                <div class="chart-container">
                    <canvas id="errorChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/layout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            initSidebar('analytics');
            const data = await api.get('/analytics/trends');
            if (!data) return;

            // Traffic Line Chart
            new Chart(document.getElementById('trafficChart'), {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{ label: 'Request Volume', data: data.traffic, borderColor: '#4f46e5', tension: 0.4 }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Response Bar Chart
            new Chart(document.getElementById('responseBarChart'), {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{ label: 'Avg Latency', data: data.responseTime, backgroundColor: '#10b981' }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Status Pie Chart
            new Chart(document.getElementById('statusPieChart'), {
                type: 'pie',
                data: {
                    labels: ['Active', 'Idle', 'Failed'],
                    datasets: [{
                        data: [22, 5, 2],
                        backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // Error Area Chart
            new Chart(document.getElementById('errorChart'), {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{ label: 'Logged Errors', data: data.errors, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', fill: true }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
    </script>
</body>
</html>
